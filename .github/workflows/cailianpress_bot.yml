# 工作流名称
name: Hot News Crawler

# 工作流触发条件
on:
  schedule:
    # 注意：GitHub Actions 的定时任务可能存在延迟
    # 每30分钟运行一次，配合90分钟的token发送周期
    - cron: '*/30 * * * *'  # 每30分钟运行一次
  # 允许在 GitHub Actions 页面手动触发此工作流
  workflow_dispatch:

# 为工作流授予权限
permissions:
  # 授予 GITHUB_TOKEN 对仓库内容的写权限，以便提交和推送代码
  contents: write

jobs:
  # 定义一个名为 "crawl" 的任务
  crawl:
    # 指定任务运行在最新版的 Ubuntu 虚拟机上
    runs-on: ubuntu-latest
    
    steps:
    # 第1步：检出仓库代码
    - name: Checkout repository
      # 使用官方的 actions/checkout@v4 来获取您的仓库代码
      uses: actions/checkout@v4
    
    # 第2步：设置 Python 环境
    - name: Set up Python
      # 升级到 v5 以支持最新的环境驱动，消除 Node.js 20 弃用警告
      uses: actions/setup-python@v5
      with:
        # 指定使用的 Python 版本
        python-version: '3.9'
    
    # 第3步：安装 Python 依赖库
    - name: Install dependencies
      run: |
        # 升级 pip 工具
        python -m pip install --upgrade pip
        # 安装脚本所需的库，新增 pandas 供 consolidator 计算历史反馈数据
        pip install requests pytz pandas
    
    # 第4步：运行爬虫脚本
    - name: Run crawler
      env:
        # 从仓库的 Secrets 中读取秘钥
        FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
        FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
        ENABLE_FEISHU_BOT: ${{ secrets.ENABLE_FEISHU_BOT }}
        GITHUB_ACTIONS: true
        USE_PROXY: false
      run: |
        # 1. 财联社新闻推送（核心业务）
        python cls_to_feishu.py
        
        # 2. 同花顺量化数据抓取（外围数据）
        python market_data_fetcher.py
        
        # 3. 数据整合与深度报告生成（核心研报）
        python market_data_consolidator.py
    
    # 第5步：提交并推送更改
    # 注意：由于我们在 .gitignore 中排除了 JSON 和 output/，
    # 这里的提交只会同步代码（脚本）的修改，不会同步运行产生的历史数据。
    # 优点：仓库极简。 缺点：Actions 云端运行将失去“历史比对”能力。
    - name: Commit and push changes
      run: |
        git config --global user.name 'GitHub Actions Binder'
        git config --global user.email 'actions@github.com'
        # 强制暂存所有 output 目录下的数据变化
        git add .
        # 如果有任何变动（无论是脚本还是数据），则提交存证
        if [ -n "$(git status --porcelain)" ]; then
          git commit -m "chore: sync market data and scripts [$(TZ=Asia/Shanghai date '+%Y-%m-%d %H:%M')]"
          git push
        else
          echo "No changes detected, skipping commit."
        fi